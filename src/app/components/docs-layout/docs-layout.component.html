<div class="docs-layout">
  <!-- Mobile Header -->
  <div class="docs-mobile-header">
    <div style="display: flex; align-items: center; gap: 8px;">
      <button class="docs-mobile-menu-btn" (click)="toggleSidebar()">
        <i class="ki-outline ki-menu"></i>
      </button>
      <a routerLink="/" class="docs-mobile-brand">
        <img src="assets/Logos/Logo5.png" alt="LicenPro" class="docs-logo-img">
      </a>
    </div>
    
    <div class="docs-mobile-actions">
      <button class="mobile-action-btn" (click)="toggleTheme()" aria-label="Toggle Theme">
        <i class="ki-outline" [class.ki-moon]="currentTheme() === 'light'" [class.ki-sun]="currentTheme() === 'dark'"></i>
      </button>
    </div>
  </div>


  <!-- Left Sidebar (Navigation) -->
  <aside class="docs-sidebar" [class.open]="isSidebarOpen">
    <div class="docs-sidebar-header">
      <a routerLink="/" class="docs-brand">
        <img src="assets/Logos/Logo5.png" alt="LicenPro" class="docs-logo-img">
      </a>
    </div>

    <!-- Search -->
    <div class="docs-search">
      <div class="docs-search-wrapper">
        <i class="ki-outline ki-magnifier docs-search-icon"></i>
        <input
          type="text"
          class="docs-search-input"
          placeholder="Search documentation..."
          [(ngModel)]="searchQuery"
          (input)="onSearchChange()"
          aria-label="Search">
      </div>
    </div>

    <!-- Navigation -->
    <nav class="docs-nav">
      <ul class="docs-nav-list">
        <li *ngFor="let item of navItems" class="docs-nav-group" [class.hidden]="item.visible === false">
          <div class="docs-nav-group-title">{{ item.label }}</div>
          
          <ul class="docs-nav-items">
            <li *ngFor="let child of item.children" class="docs-nav-item" [class.hidden]="child.visible === false">
              <a
                [routerLink]="child.route"
                [fragment]="child.fragment || undefined"
                routerLinkActive="active"
                class="docs-nav-link"
                (click)="onNavItemClick()">
                <i class="ki-outline" [ngClass]="child.icon"></i>
                <span [innerHTML]="child.matchedText || child.label"></span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>

    <div class="docs-sidebar-footer">
       <div class="docs-footer-ver">v2.4.0</div>
    </div>
  </aside>

  <!-- Overlay for Mobile -->
  <div class="docs-overlay" [class.visible]="isSidebarOpen" (click)="toggleSidebar()"></div>

  <!-- Main Content Wrapper -->
  <div class="docs-main-wrapper">
    <!-- Topbar -->
    <header class="docs-topbar">
      <div class="docs-topbar-breadcrumb">
        <span>Documentation</span>
        <i class="ki-outline ki-right"></i>
        <span class="active">Guides</span>
      </div>
      
      <div class="docs-topbar-actions">
        <a href="https://github.com/LicenPro" target="_blank" class="topbar-btn">
          <i class="ki-outline ki-github"></i>
        </a>
        <button class="docs-theme-toggle-btn" (click)="toggleTheme()">
          <i class="ki-outline" [class.ki-moon]="currentTheme() === 'light'" [class.ki-sun]="currentTheme() === 'dark'"></i>
        </button>
      </div>
    </header>

    <div class="docs-layout-content">
      <!-- Main Content Area -->
      <main class="docs-content">
        <div class="docs-content-inner">
          <router-outlet></router-outlet>
          
          <!-- Footer Navigation -->
          <footer class="docs-content-footer">
            <div class="docs-footer-line"></div>
            <div class="docs-footer-meta">
              <span>Last updated 2 days ago</span>
              <a href="#" class="edit-link"><i class="ki-outline ki-pencil"></i> Edit this page</a>
            </div>
          </footer>
        </div>
      </main>

      <!-- Right Sidebar (Table of Contents) -->
      <aside class="docs-toc">
        <div class="docs-toc-title">On this page</div>
        <nav class="docs-toc-nav">
          <ul>
            <!-- Dynamic TOC would go here, placeholders for now -->
            <li><a href="#overview" class="active">Overview</a></li>
            <li><a href="#features">Key Features</a></li>
            <li><a href="#setup">Setup Guide</a></li>
            <li><a href="#best-practices">Best Practices</a></li>
          </ul>
        </nav>
      </aside>
    </div>
  </div>
</div>
