<div class="docs-layout">
  <!-- Mobile Header -->
  <div class="docs-mobile-header">
    <button class="docs-hamburger" (click)="toggleSidebar()" aria-label="Toggle navigation">
      <i class="ki-filled" [class.ki-burger-menu-1]="!isSidebarOpen" [class.ki-cross]="isSidebarOpen"></i>
    </button>
    <a routerLink="/" class="docs-mobile-brand">
      <img src="assets/images/logo.png" alt="LicenPro" class="docs-logo-img">
      <span>Documentation</span>
    </a>
    <button class="docs-theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
      <i class="ki-filled" [class.ki-moon]="currentTheme() === 'light'" [class.ki-sun]="currentTheme() === 'dark'"></i>
    </button>
  </div>

  <!-- Sidebar -->
  <aside class="docs-sidebar" [class.open]="isSidebarOpen">
    <div class="docs-sidebar-header">
      <a routerLink="/" class="docs-brand">
        <img src="assets/images/logo.png" alt="LicenPro" class="docs-logo-img">
        <span class="docs-brand-text">
          <span class="docs-brand-name">LicenPro</span>
          <span class="docs-brand-subtitle">Documentation</span>
        </span>
      </a>
      <button class="docs-theme-toggle" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
        <i class="ki-filled" [class.ki-moon]="currentTheme() === 'light'" [class.ki-sun]="currentTheme() === 'dark'"></i>
        <span class="docs-theme-label">{{ currentTheme() === 'dark' ? 'Light' : 'Dark' }}</span>
      </button>
    </div>

    <!-- Search -->
    <div class="docs-search">
      <div class="docs-search-wrapper">
        <i class="ki-filled ki-magnifier docs-search-icon"></i>
        <input
          type="text"
          class="docs-search-input"
          placeholder="Search documentation..."
          [(ngModel)]="searchQuery"
          (input)="onSearchChange()"
          (keydown)="onSearchKeydown($event)"
          aria-label="Search documentation">
        <button
          *ngIf="searchQuery"
          class="docs-search-clear"
          (click)="clearSearch()"
          aria-label="Clear search">
          <i class="ki-filled ki-cross"></i>
        </button>
      </div>
    </div>

    <!-- Navigation -->
    <nav class="docs-nav">
      <ul class="docs-nav-list">
        <li *ngFor="let item of navItems" class="docs-nav-group" [class.hidden]="item.visible === false">
          <button
            class="docs-nav-header"
            (click)="toggleCategory(item)"
            [attr.aria-expanded]="item.expanded"
            [attr.aria-controls]="'nav-' + item.id">
            <div class="docs-nav-header-content">
              <i class="ki-filled" [ngClass]="item.icon"></i>
              <span [innerHTML]="item.matchedText || item.label"></span>
            </div>
            <i class="ki-filled ki-down docs-nav-arrow" [class.expanded]="item.expanded"></i>
          </button>

          <ul
            *ngIf="item.children"
            class="docs-nav-items"
            [id]="'nav-' + item.id"
            [@slideDown]="item.expanded ? 'expanded' : 'collapsed'">
            <li *ngFor="let child of item.children" class="docs-nav-item" [class.hidden]="child.visible === false">
              <a
                [routerLink]="child.route"
                routerLinkActive="active"
                class="docs-nav-link"
                [class.keyboard-focused]="isItemFocused(child)"
                (click)="onNavItemClick()">
                <i class="ki-filled" [ngClass]="child.icon"></i>
                <span [innerHTML]="child.matchedText || child.label"></span>
              </a>
            </li>
          </ul>
        </li>
      </ul>
    </nav>

    <!-- Sidebar Footer -->
    <div class="docs-sidebar-footer">
      <a href="https://github.com" target="_blank" rel="noopener" class="docs-sidebar-link">
        <i class="ki-filled ki-github"></i>
        <span>GitHub</span>
      </a>
      <a href="https://licenpro.com" class="docs-sidebar-link">
        <i class="ki-filled ki-home"></i>
        <span>LicenPro Home</span>
      </a>
    </div>
  </aside>

  <!-- Overlay -->
  <div class="docs-overlay" [class.visible]="isSidebarOpen" (click)="toggleSidebar()"></div>

  <!-- Main Content -->
  <main class="docs-main">
    <!-- Topbar -->
    <header class="docs-topbar">
      <div class="docs-topbar-start">
        <button class="docs-sidebar-toggle" (click)="toggleSidebar()" aria-label="Toggle sidebar">
          <i class="ki-filled ki-burger-menu-1"></i>
        </button>
      </div>
      <nav class="docs-topbar-nav">
        <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Guides</a>
        <a routerLink="/api-reference" routerLinkActive="active">API Reference</a>
        <a routerLink="/sdk-dotnet" routerLinkActive="active">Libraries</a>
        <a routerLink="/changelog" routerLinkActive="active">Changelog</a>
      </nav>
      <div class="docs-topbar-end">
        <button class="docs-theme-toggle docs-theme-toggle-sm" (click)="toggleTheme()" [attr.aria-label]="'Toggle theme'">
          <i class="ki-filled" [class.ki-moon]="currentTheme() === 'light'" [class.ki-sun]="currentTheme() === 'dark'"></i>
        </button>
      </div>
    </header>

    <!-- Content -->
    <div class="docs-content">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
