<div class="docs-layout">
  <div class="docs-mobile-header">
    <div class="docs-mobile-header-row">
      <div style="display: flex; align-items: center; gap: 8px;">
        <button type="button" class="docs-mobile-menu-btn" (click)="toggleSidebar()" aria-label="Open menu">
          <i class="ki-outline ki-menu"></i>
        </button>
        <a routerLink="/" class="docs-mobile-brand">
          <img src="assets/Logos/Logo5.png" alt="LicenPro" class="docs-logo-img">
        </a>
      </div>

      <div class="docs-mobile-actions">
        <button type="button" class="mobile-action-btn" (click)="toggleTheme()" aria-label="Toggle theme">
          <i class="ki-outline" [class.ki-moon]="currentTheme() === 'light'" [class.ki-sun]="currentTheme() === 'dark'"></i>
        </button>
      </div>
    </div>

    <div class="docs-nav-tabs docs-nav-tabs--mobile" role="tablist" aria-label="Documentation scope">
      <button
        type="button"
        role="tab"
        class="docs-nav-tab"
        [class.active]="navMode() === 'guides'"
        [attr.aria-selected]="navMode() === 'guides'"
        (click)="selectGuidesTab()">
        Guides
      </button>
      <button
        type="button"
        role="tab"
        class="docs-nav-tab"
        [class.active]="navMode() === 'api'"
        [attr.aria-selected]="navMode() === 'api'"
        (click)="selectApiTab()">
        API reference
      </button>
    </div>
  </div>

  <aside class="docs-sidebar" [class.open]="isSidebarOpen">
    <div class="docs-sidebar-header">
      <a routerLink="/" class="docs-brand">
        <img src="assets/Logos/Logo5.png" alt="LicenPro" class="docs-logo-img">
      </a>
    </div>

    <div class="docs-nav-tabs" role="tablist" aria-label="Documentation scope">
      <button
        type="button"
        role="tab"
        class="docs-nav-tab"
        [class.active]="navMode() === 'guides'"
        [attr.aria-selected]="navMode() === 'guides'"
        (click)="selectGuidesTab(); onNavItemClick()">
        Guides
      </button>
      <button
        type="button"
        role="tab"
        class="docs-nav-tab"
        [class.active]="navMode() === 'api'"
        [attr.aria-selected]="navMode() === 'api'"
        (click)="selectApiTab(); onNavItemClick()">
        API reference
      </button>
    </div>

    <div class="docs-search">
      <div class="docs-search-wrapper">
        <i class="ki-outline ki-magnifier docs-search-icon"></i>
        <input
          type="text"
          class="docs-search-input"
          [placeholder]="searchPlaceholder"
          [(ngModel)]="searchQuery"
          (input)="onSearchChange()"
          (keydown)="onSearchKeydown($event)"
          [attr.aria-label]="searchPlaceholder">
      </div>
      @if (navMode() === 'api' && searchQuery.trim()) {
        <p class="docs-search-hint">Filtering API sidebar only.</p>
      }
    </div>

    <nav class="docs-nav">
      <ul class="docs-nav-list">
        <li *ngFor="let section of displayNavSections" class="docs-nav-group" [class.hidden]="section.visible === false">
          <div class="docs-nav-group-title">
            <span [innerHTML]="section.matchedText || section.label"></span>
          </div>

          <ul class="docs-nav-items">
            <ng-container *ngFor="let item of section.items">
              <li *ngIf="item.children?.length" class="docs-nav-item docs-nav-subgroup" [class.hidden]="item.visible === false">
                <div class="docs-nav-sublabel">
                  <i class="ki-outline" [ngClass]="item.icon"></i>
                  <span [innerHTML]="item.matchedText || item.label"></span>
                </div>
                <ul class="docs-nav-sublist">
                  <li *ngFor="let sub of item.children" class="docs-nav-item" [class.hidden]="sub.visible === false">
                    <a
                      [routerLink]="sub.route"
                      [fragment]="sub.fragment || undefined"
                      routerLinkActive="active"
                      class="docs-nav-link"
                      [class.keyboard-focused]="isItemFocused(sub)"
                      (click)="onNavItemClick()">
                      <i class="ki-outline" [ngClass]="sub.icon"></i>
                      <span [innerHTML]="sub.matchedText || sub.label"></span>
                    </a>
                  </li>
                </ul>
              </li>

              <li *ngIf="!item.children?.length" class="docs-nav-item" [class.hidden]="item.visible === false">
                <a
                  [routerLink]="item.route"
                  [fragment]="item.fragment || undefined"
                  routerLinkActive="active"
                  class="docs-nav-link"
                  [class.keyboard-focused]="isItemFocused(item)"
                  (click)="onNavItemClick()">
                  <i class="ki-outline" [ngClass]="item.icon"></i>
                  <span [innerHTML]="item.matchedText || item.label"></span>
                </a>
              </li>
            </ng-container>
          </ul>
        </li>
      </ul>
    </nav>

    <div class="docs-sidebar-footer">
      <div class="docs-footer-ver">v2.4.0</div>
    </div>
  </aside>

  <div class="docs-overlay" [class.visible]="isSidebarOpen" (click)="toggleSidebar()"></div>

  <div class="docs-main-wrapper">
    <header class="docs-topbar">
      <div class="docs-topbar-breadcrumb">
        @for (seg of breadcrumbSegments(); track $index; let i = $index) {
          @if (i > 0) {
            <i class="ki-outline ki-right" aria-hidden="true"></i>
          }
          <span [class.active]="seg.current">{{ seg.label }}</span>
        }
      </div>

      <div class="docs-topbar-actions">
        <a href="https://github.com/LicenPro" target="_blank" rel="noopener noreferrer" class="topbar-btn" aria-label="GitHub">
          <i class="ki-outline ki-github"></i>
        </a>
        <button type="button" class="docs-theme-toggle-btn" (click)="toggleTheme()" aria-label="Toggle theme">
          <i class="ki-outline" [class.ki-moon]="currentTheme() === 'light'" [class.ki-sun]="currentTheme() === 'dark'"></i>
        </button>
      </div>
    </header>

    <div class="docs-layout-content">
      <main class="docs-content">
        <div class="docs-content-inner">
          <router-outlet></router-outlet>

          <footer class="docs-content-footer">
            <div class="docs-footer-line"></div>
            <div class="docs-footer-meta">
              <span>LicenPro documentation</span>
              <a href="https://github.com/LicenPro" target="_blank" rel="noopener noreferrer" class="edit-link">
                <i class="ki-outline ki-github"></i> GitHub
              </a>
            </div>
          </footer>
        </div>
      </main>

      <aside class="docs-toc">
        <div class="docs-toc-title">On this page</div>
        <nav class="docs-toc-nav">
          <ul>
            <li><a href="#top" class="active">Top</a></li>
          </ul>
        </nav>
      </aside>
    </div>
  </div>
</div>
